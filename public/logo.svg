<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background gradient circles -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="30%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#FFEACC" />
      <stop offset="50%" stop-color="#FF7700" />
      <stop offset="100%" stop-color="#B71C1C" />
    </radialGradient>
    <linearGradient id="maceBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF8D4" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#866819" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#FDFBF7" rx="80" />
  
  <!-- Outer Halo Ring -->
  <circle cx="256" cy="180" r="140" fill="none" stroke="#FF7700" stroke-width="4" stroke-dasharray="10 6" />
  <circle cx="256" cy="180" r="120" fill="url(#halo)" opacity="0.35" />

  <!-- Mace head (Gada shape) -->
  <circle cx="256" cy="180" r="90" fill="url(#maceBody)" stroke="#866819" stroke-width="6" />
  <path d="M166 180h180" stroke="#866819" stroke-width="4" />
  <path d="M256 90v180" stroke="#866819" stroke-width="4" />

  <!-- Mace Handle -->
  <rect x="246" y="270" width="20" height="190" rx="6" fill="url(#maceBody)" stroke="#866819" stroke-width="4" />
  
  <!-- Handle Grip details -->
  <line x1="246" y1="320" x2="266" y2="320" stroke="#866819" stroke-width="3" />
  <line x1="246" y1="360" x2="266" y2="360" stroke="#866819" stroke-width="3" />
  <line x1="246" y1="400" x2="266" y2="400" stroke="#866819" stroke-width="3" />
  <line x1="246" y1="440" x2="266" y2="440" stroke="#866819" stroke-width="3" />
  
  <!-- Mace Base Knob -->
  <circle cx="256" cy="466" r="16" fill="url(#maceBody)" stroke="#866819" stroke-width="4" />
</svg>
